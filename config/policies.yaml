policies:
  - name: "strict_coding_assistant"
    budget_ratio: 0.9
    steps: ["paging", "collapse", "compact", "canonicalize", "json_trim", "table_reduce", "code_outline", "error_stack_focus", "snip", "auto_compact_sync", "auto_compact_async", "prefix_cache", "assemble"]
    snip_params:
      keep_head_lines: 18
      keep_tail_lines: 8
  - name: "creative_chat"
    budget_ratio: 1.0
    steps: ["collapse", "compact", "canonicalize", "table_reduce", "auto_compact_sync", "auto_compact_async", "prefix_cache", "assemble"]
    auto_compact_threshold: 4000
